<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>봄버맨</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f23;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      user-select: none;
    }
    h1 { font-size: 1.8rem; margin-bottom: 8px; letter-spacing: 3px; }
    #hud {
      display: flex;
      gap: 20px;
      margin-bottom: 8px;
      font-size: 0.95rem;
      background: rgba(255,255,255,0.1);
      padding: 6px 18px;
      border-radius: 20px;
    }
    canvas { display: block; border-radius: 6px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    #msg { margin-top: 10px; font-size: 0.8rem; color: #888; }
  </style>
</head>
<body>
  <h1>💣 봄버맨</h1>
  <div id="hud">
    <span>❤️ <b id="hlives">3</b></span>
    <span>💣 <b id="hbombs">1</b></span>
    <span>🔥 <b id="hrange">3</b></span>
    <span>👾 <b id="henemies">3</b></span>
    <span>⭐ <b id="hscore">0</b></span>
  </div>
  <canvas id="c"></canvas>
  <div id="msg">방향키 / WASD: 이동 &nbsp;|&nbsp; 스페이스: 폭탄 &nbsp;|&nbsp; R: 재시작</div>

<script>
const CELL = 48, COLS = 15, ROWS = 13;
const W = COLS * CELL, H = ROWS * CELL;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

const EMPTY = 0, WALL = 1, SOFT = 2;
const PU_BOMB = 'B', PU_RANGE = 'R', PU_SPEED = 'S';
const DIRS = [{dc:0,dr:-1},{dc:0,dr:1},{dc:-1,dr:0},{dc:1,dr:0}];

let map, player, enemies, bombs, fires, powerups, score, lives, gameState, totalTime;

function initGame() {
  score = 0; lives = 3; gameState = 'playing'; totalTime = 0;
  bombs = []; fires = []; powerups = [];

  map = Array.from({length: ROWS}, (_, r) =>
    Array.from({length: COLS}, (_, c) =>
      (r % 2 === 1 && c % 2 === 1) ? WALL : EMPTY
    )
  );

  const safe = new Set([
    '0,0','0,1','1,0',
    `0,${COLS-1}`,`0,${COLS-2}`,`1,${COLS-1}`,
    `${ROWS-1},0`,`${ROWS-2},0`,`${ROWS-1},1`,
    `${ROWS-1},${COLS-1}`,`${ROWS-2},${COLS-1}`,`${ROWS-1},${COLS-2}`,
  ]);

  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (map[r][c] === EMPTY && !safe.has(`${r},${c}`) && Math.random() < 0.38)
        map[r][c] = SOFT;

  player = {
    col: 0, row: 0, px: 0, py: 0,
    moveTimer: 0, MOVE_SPEED: 0.14,
    alive: true, bombsMax: 1, bombsPlaced: 0, range: 3, invincible: 0,
  };

  enemies = [
    {col:COLS-1, row:0,      dir:1, moveTimer:0.3, MOVE_SPEED:0.45},
    {col:0,      row:ROWS-1, dir:0, moveTimer:0.5, MOVE_SPEED:0.50},
    {col:COLS-1, row:ROWS-1, dir:2, moveTimer:0.4, MOVE_SPEED:0.42},
  ];
  enemies.forEach(e => { e.alive = true; e.px = e.col*CELL; e.py = e.row*CELL; });
}

function canWalk(c, r) {
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return false;
  if (map[r][c] !== EMPTY) return false;
  if (bombs.some(b => b.col === c && b.row === r)) return false;
  return true;
}

function shuffle(a) {
  const arr = [...a];
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

const keys = {};
document.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  keys[e.code] = true;
  if (e.code === 'KeyR') initGame();
});
document.addEventListener('keyup', e => { delete keys[e.code]; });

function update(dt) {
  if (gameState !== 'playing') return;
  totalTime += dt;

  if (player.alive) {
    player.invincible = Math.max(0, player.invincible - dt);
    player.moveTimer -= dt;

    if (player.moveTimer <= 0) {
      const pc = player.col, pr = player.row;
      if      (keys['ArrowUp']    || keys['KeyW']) { if (canWalk(pc, pr-1)) player.row--; }
      else if (keys['ArrowDown']  || keys['KeyS']) { if (canWalk(pc, pr+1)) player.row++; }
      else if (keys['ArrowLeft']  || keys['KeyA']) { if (canWalk(pc-1, pr)) player.col--; }
      else if (keys['ArrowRight'] || keys['KeyD']) { if (canWalk(pc+1, pr)) player.col++; }
      if (player.col !== pc || player.row !== pr) player.moveTimer = player.MOVE_SPEED;
    }

    player.px += (player.col*CELL - player.px) * Math.min(1, dt*18);
    player.py += (player.row*CELL - player.py) * Math.min(1, dt*18);

    if (keys['Space'] && !keys['_sp'] && player.bombsPlaced < player.bombsMax) {
      if (!bombs.some(b => b.col === player.col && b.row === player.row)) {
        bombs.push({col:player.col, row:player.row, timer:2.5, range:player.range});
        player.bombsPlaced++;
      }
      keys['_sp'] = true;
    }
    if (!keys['Space']) keys['_sp'] = false;

    const pu = powerups.find(p => p.col === player.col && p.row === player.row);
    if (pu) {
      if (pu.type === PU_BOMB)  player.bombsMax++;
      else if (pu.type === PU_RANGE) player.range++;
      else player.MOVE_SPEED = Math.max(0.08, player.MOVE_SPEED - 0.02);
      powerups = powerups.filter(p => p !== pu);
      score += 50;
    }

    if (player.invincible <= 0) {
      if (fires.some(f => f.col === player.col && f.row === player.row) ||
          enemies.some(e => e.alive && e.col === player.col && e.row === player.row)) {
        playerDie();
      }
    }
  }

  enemies.forEach(e => {
    if (!e.alive) return;
    e.moveTimer -= dt;
    if (e.moveTimer <= 0) {
      e.moveTimer = e.MOVE_SPEED;
      const tryOrder = [e.dir, ...shuffle([0,1,2,3].filter(d => d !== e.dir))];
      for (const d of tryOrder) {
        const nc = e.col + DIRS[d].dc, nr = e.row + DIRS[d].dr;
        if (canWalk(nc, nr)) { e.col = nc; e.row = nr; e.dir = d; break; }
      }
    }
    e.px += (e.col*CELL - e.px) * Math.min(1, dt*10);
    e.py += (e.row*CELL - e.py) * Math.min(1, dt*10);
    if (player.alive && player.invincible <= 0 &&
        e.col === player.col && e.row === player.row) playerDie();
  });

  const toExplode = bombs.filter(b => { b.timer -= dt; return b.timer <= 0; });
  bombs = bombs.filter(b => b.timer > 0);
  toExplode.forEach(explodeBomb);

  fires.forEach(f => f.timer -= dt);
  fires = fires.filter(f => f.timer > 0);

  document.getElementById('hlives').textContent = lives;
  document.getElementById('hbombs').textContent = player.bombsMax;
  document.getElementById('hrange').textContent = player.range;
  document.getElementById('henemies').textContent = enemies.filter(e => e.alive).length;
  document.getElementById('hscore').textContent = score;

  if (enemies.every(e => !e.alive)) gameState = 'won';
}

function playerDie() {
  lives--;
  if (lives <= 0) { player.alive = false; gameState = 'lost'; return; }
  player.col = 0; player.row = 0; player.px = 0; player.py = 0;
  player.bombsPlaced = 0; player.invincible = 2.5;
}

function explodeBomb(b) {
  player.bombsPlaced = Math.max(0, player.bombsPlaced - 1);
  addFire(b.col, b.row);
  for (const dir of DIRS) {
    for (let i = 1; i <= b.range; i++) {
      const c = b.col + dir.dc*i, r = b.row + dir.dr*i;
      if (c < 0 || c >= COLS || r < 0 || r >= ROWS) break;
      if (map[r][c] === WALL) break;
      addFire(c, r);
      if (map[r][c] === SOFT) {
        map[r][c] = EMPTY;
        score += 10;
        if (Math.random() < 0.3) {
          const types = [PU_BOMB, PU_RANGE, PU_SPEED];
          powerups.push({col:c, row:r, type:types[Math.floor(Math.random()*3)]});
        }
        break;
      }
      const chain = bombs.find(cb => cb.col === c && cb.row === r);
      if (chain) chain.timer = 0;
    }
  }
}

function addFire(c, r) {
  const ex = fires.find(f => f.col === c && f.row === r);
  if (ex) ex.timer = 0.55; else fires.push({col:c, row:r, timer:0.55});
  enemies.forEach(e => { if (e.alive && e.col === c && e.row === r) { e.alive = false; score += 100; }});
  powerups = powerups.filter(p => !(p.col === c && p.row === r));
}

function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

function render() {
  ctx.fillStyle = '#5a8a5a';
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 1;
  for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(0,r*CELL); ctx.lineTo(W,r*CELL); ctx.stroke(); }
  for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(c*CELL,0); ctx.lineTo(c*CELL,H); ctx.stroke(); }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c*CELL, y = r*CELL;
      if (map[r][c] === WALL) {
        ctx.fillStyle = '#3a3a3a';
        ctx.fillRect(x+1, y+1, CELL-2, CELL-2);
        ctx.fillStyle = '#565656';
        ctx.fillRect(x+1, y+1, CELL-2, 5);
        ctx.fillRect(x+1, y+1, 5, CELL-2);
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(x+CELL-4, y+1, 3, CELL-2);
        ctx.fillRect(x+1, y+CELL-4, CELL-2, 3);
      } else if (map[r][c] === SOFT) {
        ctx.fillStyle = '#7B3F00';
        ctx.fillRect(x+2, y+2, CELL-4, CELL-4);
        ctx.fillStyle = '#9B5520';
        ctx.fillRect(x+2, y+2, CELL-4, 6);
        ctx.fillRect(x+2, y+2, 6, CELL-4);
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        for (let g = 12; g < CELL-2; g += 12) {
          ctx.fillRect(x+g, y+4, 1, CELL-8);
        }
      }
    }
  }

  powerups.forEach(pu => {
    const x = pu.col*CELL, y = pu.row*CELL;
    const pulse = Math.sin(totalTime * 4) * 2;
    ctx.fillStyle = pu.type === PU_BOMB ? '#FF6B6B' : pu.type === PU_RANGE ? '#4ECDC4' : '#FFE66D';
    drawRoundRect(x+8+pulse, y+8+pulse, CELL-16-pulse*2, CELL-16-pulse*2, 6);
    ctx.fill();
    ctx.font = '18px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(pu.type === PU_BOMB ? '💣' : pu.type === PU_RANGE ? '🔥' : '⚡', x+CELL/2, y+CELL/2);
  });

  fires.forEach(f => {
    const x = f.col*CELL, y = f.row*CELL;
    const a = f.timer > 0.2 ? 0.92 : (f.timer/0.2)*0.92;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = '#FF4500';
    ctx.fillRect(x+1, y+1, CELL-2, CELL-2);
    ctx.fillStyle = '#FFB300';
    ctx.fillRect(x+10, y+10, CELL-20, CELL-20);
    ctx.fillStyle = '#FFF176';
    ctx.fillRect(x+18, y+18, CELL-36, CELL-36);
    ctx.restore();
  });

  bombs.forEach(b => {
    const x = b.col*CELL + CELL/2, y = b.row*CELL + CELL/2;
    const pulse = 1 + Math.sin(totalTime * (b.timer < 1 ? 20 : 8)) * 0.06;
    const rad = (CELL/2 - 7) * pulse;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(x+2, y+6, rad*0.9, rad*0.5, 0, 0, Math.PI*2); ctx.fill();
    const grad = ctx.createRadialGradient(x-5, y-5, 1, x, y, rad);
    grad.addColorStop(0, '#666'); grad.addColorStop(1, '#0a0a0a');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#777'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x+3, y-rad+2); ctx.quadraticCurveTo(x+10, y-rad-10, x+8, y-rad-16); ctx.stroke();
    const sparkR = b.timer < 0.8 ? 6 : (b.timer < 1.5 ? 4 : 3);
    ctx.fillStyle = b.timer < 0.8 ? '#FF2200' : b.timer < 1.5 ? '#FF8800' : '#FFDD00';
    ctx.beginPath(); ctx.arc(x+8, y-rad-16, sparkR, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  enemies.forEach(e => {
    if (!e.alive) return;
    const x = e.px + CELL/2, y = e.py + CELL/2;
    ctx.save();
    ctx.fillStyle = '#922B21';
    ctx.beginPath(); ctx.arc(x, y+3, CELL/2-5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#E74C3C';
    ctx.beginPath(); ctx.arc(x, y-5, CELL/2-9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(x-6, y-7, 5, 0, Math.PI*2); ctx.arc(x+6, y-7, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(x-5, y-7, 2.5, 0, Math.PI*2); ctx.arc(x+7, y-7, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x-10,y-13); ctx.lineTo(x-2,y-11); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+10,y-13); ctx.lineTo(x+2,y-11); ctx.stroke();
    ctx.restore();
  });

  if (player.alive) {
    const blink = player.invincible > 0 && Math.floor(player.invincible*8) % 2 === 0;
    if (!blink) {
      const x = player.px + CELL/2, y = player.py + CELL/2;
      ctx.save();
      ctx.fillStyle = '#1A5276';
      ctx.beginPath(); ctx.arc(x, y+4, CELL/2-6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#2E86C1';
      ctx.beginPath(); ctx.arc(x, y+4, CELL/2-8, 0, Math.PI); ctx.fill();
      ctx.fillStyle = '#F0B27A';
      ctx.beginPath(); ctx.arc(x, y-6, CELL/2-10, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(x-4, y-8, 2, 0, Math.PI*2); ctx.arc(x+4, y-8, 2, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#7B241C'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(x, y-4, 4, 0.15, Math.PI-0.15); ctx.stroke();
      ctx.restore();
    }
  }

  if (gameState !== 'playing') {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, W, H);
    const won = gameState === 'won';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = won ? '#F4D03F' : '#E74C3C';
    ctx.font = 'bold 52px sans-serif';
    ctx.fillText(won ? '🎉 승리!' : '💀 게임 오버', W/2, H/2 - 30);
    ctx.fillStyle = 'white';
    ctx.font = '22px sans-serif';
    ctx.fillText(`최종 점수: ${score}`, W/2, H/2 + 18);
    ctx.fillStyle = '#aaa';
    ctx.font = '16px sans-serif';
    ctx.fillText('R 키로 재시작', W/2, H/2 + 52);
    ctx.restore();
  }
}

let lastTime = null;
function gameLoop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

initGame();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
